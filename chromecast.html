<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromecast Stream</title>

  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      color: #ccc;
      min-height: 18px;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      text-align: center;
      color: #666;
    }

    @media (max-width: 480px) {
      h2 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📺 Cast Stream</h2>

  <div class="input-group">
    <input id="url" placeholder="Masukkan URL m3u8 / mpd / mp4">
    <button id="castBtn" onclick="cast()">Cast ke TV</button>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    Support: HLS (.m3u8) • DASH (.mpd) • MP4
  </div>
</div>

<script>
const statusEl = document.getElementById("status");
const btn = document.getElementById("castBtn");

window['__onGCastApiAvailable'] = function(isAvailable) {
  if (isAvailable) {
    cast.framework.CastContext.getInstance().setOptions({
      receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID
    });
    setStatus("Cast siap digunakan");
  } else {
    setStatus("Cast API tidak tersedia");
  }
};

function setStatus(msg) {
  statusEl.textContent = msg;
}

function getMimeType(url) {
  if (url.includes(".m3u8")) return "application/x-mpegURL";
  if (url.includes(".mpd")) return "application/dash+xml";
  if (url.includes(".mp4")) return "video/mp4";
  return "video/mp4";
}

async function cast() {
  const url = document.getElementById("url").value.trim();

  if (!url) {
    setStatus("⚠️ Masukkan URL dulu");
    return;
  }

  const context = cast.framework.CastContext.getInstance();

  btn.disabled = true;
  setStatus("Menghubungkan ke device...");

  try {
    await context.requestSession();
    const session = context.getCurrentSession();

    const mime = getMimeType(url);

    const mediaInfo = new chrome.cast.media.MediaInfo(url, mime);
    mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
    mediaInfo.metadata.title = "Streaming";

    const request = new chrome.cast.media.LoadRequest(mediaInfo);

    await session.loadMedia(request);

    setStatus("✅ Berhasil cast ke TV");

  } catch (e) {
    console.error(e);
    setStatus("❌ Gagal cast: " + e.message);
  }

  btn.disabled = false;
}
</script>

</body>
</html>
