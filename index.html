<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Tools</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 90%;
      max-width: 300px;
    }

    a {
      text-decoration: none;
    }

    .btn {
      display: block;
      padding: 14px;
      text-align: center;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="streamplayer.html" class="btn">
      Cek Video Stream Player
    </a>

    <a href="chromecast.html" class="btn">
      Chrome Cast
    </a>
  </div>

</body>
</html>
